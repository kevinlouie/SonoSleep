# Deploy on the Synology HA host. host network so the Sonos can reach the stream
# port and the service can reach the MQTT broker / HA REST API on the LAN.
#
# Pull (private GHCR) requires a one-time login on the host:
#   echo <GHCR_PAT_with_read:packages> | docker login ghcr.io -u kevinlouie --password-stdin
# For local development, swap `image:` for `build: .`.
services:
  hwnsonos:
    image: ghcr.io/kevinlouie/ha-white-noise-sonos:latest
    container_name: hwnsonos
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
